                    <div className="text-right text-gray-500 pt-2 text-sm">Datum: {project.date || currentDate}</div>
                  </div>
                  <div className="w-full h-0.5 bg-orange-500 mb-10"></div>
                  <div className="mb-10 text-center"><h2 className="text-2xl font-bold uppercase text-gray-700 mb-1 tracking-wide">{project.subTitle}</h2><h1 className="text-2xl font-bold uppercase text-black tracking-wide min-h-[32px]">{project.projectType || "NÁZEV PROJEKTU"}</h1></div>
                  <div className="mb-10 bg-gray-50 border-l-4 border-orange-500 p-5"><h3 className="text-orange-500 font-bold text-lg mb-2">Zákazník</h3><div className="text-lg text-black font-medium leading-snug">{customer.name && <p className="font-bold">{customer.name}</p>}{customer.address && <p>{customer.address}</p>}{customer.city && <p>{customer.city}</p>}{customer.phone && <p>Tel: {customer.phone}</p>}{customer.email && <p>Email: {customer.email}</p>}{!customer.name && !customer.address && !customer.city && !customer.phone && !customer.email && (<p className="text-gray-400 italic text-sm">Údaje o zákazníkovi nejsou vyplněny</p>)}</div></div>
                  <div className="mb-10"><h3 className="font-bold text-xl mb-3 text-gray-800 border-b border-gray-200 pb-1">Popis práce</h3><div className="description-content text-base leading-relaxed text-justify text-gray-800 min-h-[20px] whitespace-pre-wrap">{project.description || "Zde bude uveden popis prací..."}</div></div>
                  <div className="mb-6">
                    <h3 className="font-bold text-xl mb-4 text-gray-800 border-b border-gray-200 pb-1">Cenová kalkulace</h3>
                    <table className="w-full border-collapse border border-gray-300 text-base"><thead className="hidden"><tr><th></th><th></th><th></th></tr></thead><tbody>{Object.entries(groupedItems).map(([catName, catItems]) => (<React.Fragment key={catName}><tr className="bg-gray-200"><td colSpan="3" className="border border-gray-300 p-2 pl-3 font-bold text-black">{catName}</td></tr>{catItems.map((item) => (<tr key={item.id}><td className="border border-gray-300 p-2 pl-3 align-top w-2/3">{item.name}</td><td className="border border-gray-300 p-2 text-center align-top whitespace-nowrap">{item.amount} {item.unit}</td><td className="border border-gray-300 p-2 text-right align-top whitespace-nowrap">{formatCurrency(item.price)}</td></tr>))}</React.Fragment>))}</tbody></table>
                    
                    {/* Obaleno do break-inside-avoid, aby se černý rámeček k úhradě nikdy netiskl sám na další stránce */}
                    <div className="break-inside-avoid">
                        <div className="border-x border-b border-gray-300">{priceSettings.discount > 0 && (<div className="flex justify-between p-2 border-b border-gray-300 text-red-600"><span>Sleva {priceSettings.discount} %</span><span>-{formatCurrency(calculateDiscountAmount())}</span></div>)}<div className="flex justify-between items-center p-3 bg-[#FFF7ED] font-bold text-lg text-black"><span>{priceSettings.totalLabel}</span><span>{formatCurrency(calculateTotal())}</span></div></div>
                        <div className="bg-[#2D2D2D] p-6 mt-4 flex justify-end items-center rounded-sm"><div className="text-right"><div className="text-gray-300 text-sm font-medium uppercase tracking-wider mb-1">{priceSettings.payableLabel}</div><div className="text-[#E67E22] text-4xl font-bold">{formatPriceSimple(getFinalPrice())} Kč</div></div></div>
                    </div>
                  </div>
                  
                  {/* Odebráno break-before-page - fotky se napojí hned za rozpočet */}
                  {photos.length > 0 && (<div className="mt-12 pt-8 border-t-2 border-dashed border-gray-200"><div className="flex justify-between items-end mb-6 text-sm text-gray-500 border-b pb-2"><div>{currentDate}</div><div>Fotodokumentace materiálu</div></div><h3 className="font-bold text-xl uppercase mb-6 text-center text-gray-700">Fotodokumentace materiálu</h3><div className="grid grid-cols-3 gap-6">{photos.map((photo, index) => (<div key={index} className="text-center break-inside-avoid"><div className="aspect-square border border-gray-200 flex items-center justify-center overflow-hidden mb-2 bg-white p-2"><img src={photo.src} alt={photo.caption} className="object-contain w-full h-full" /></div><p className="text-sm font-serif text-gray-600">{photo.caption}</p></div>))}</div></div>)}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
